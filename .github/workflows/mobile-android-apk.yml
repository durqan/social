name: mobile-android-apk

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: 'Public HTTPS backend API base URL, for example https://example.com/api'
        required: true
        type: string

jobs:
  build:
    name: Build Android debug APK
    runs-on: ubuntu-latest
    env:
      SOCIAL_API_BASE_URL: ${{ inputs.api_base_url }}

    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses

      - name: Install dependencies
        run: npm ci

      - name: Validate mobile dependencies
        run: |
          if npm ls @react-native-cookies/cookies; then
            echo "@react-native-cookies/cookies must not be installed."
            exit 1
          fi

          npm ls @preeternal/react-native-cookie-manager

      - name: Validate API base URL
        run: |
          if [ -z "$SOCIAL_API_BASE_URL" ]; then
            echo "api_base_url workflow input is required."
            exit 1
          fi

          if ! printf '%s' "$SOCIAL_API_BASE_URL" | grep -Eq '^https://'; then
            echo "api_base_url must be a public HTTPS URL."
            exit 1
          fi

          if printf '%s' "$SOCIAL_API_BASE_URL" | grep -Eq '(^https://(localhost|127\.0\.0\.1|10\.0\.2\.2)(:|/|$))|(^https://192\.168\.)|(^https://10\.)|(^https://172\.(1[6-9]|2[0-9]|3[0-1])\.)|/api/api(/|$)'; then
            echo "api_base_url must not point to localhost, emulator, LAN/private IP, or contain /api/api."
            exit 1
          fi

          echo "Building APKs with SOCIAL_API_BASE_URL=$SOCIAL_API_BASE_URL"

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test -- --runInBand

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          npm run build:android

      - name: Build release APK
        run: |
          npm run build:android:release

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: social-mobile-debug-apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: social-mobile-release-apk
          path: mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
