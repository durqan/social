server {
    listen 80 default_server;
    server_name durqan.ru livekit.durqan.ru turn.durqan.ru;

    location = /gateway-health {
        access_log off;
        return 200 "ok\n";
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8443 ssl;
    server_name livekit.durqan.ru;

    ssl_certificate /etc/letsencrypt/live/livekit.durqan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/livekit.durqan.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://livekit:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }
}

server {
    listen 8443 ssl;
    server_name durqan.ru;

    ssl_certificate /etc/letsencrypt/live/durqan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/durqan.ru/privkey.pem;

    client_max_body_size 30M;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ~ ^/api/messages/(upload|upload-voice|upload-video-note)$ {
        client_max_body_size 550M;
        client_body_timeout 1200s;
        proxy_request_buffering off;
        proxy_connect_timeout 60s;
        proxy_read_timeout 1200s;
        proxy_send_timeout 1200s;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/users/[0-9]+/avatar$ {
        client_max_body_size 550M;
        client_body_timeout 300s;
        proxy_request_buffering off;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
