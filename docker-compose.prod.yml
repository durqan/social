services:
  postgres:
    image: postgres:18-alpine
    container_name: social_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  redis:
    image: redis:7-alpine
    container_name: social_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  rabbitmq:
    image: rabbitmq:3-alpine
    container_name: social_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    volumes:
      - rabbit_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  uploads-permissions:
    image: alpine:3.20
    container_name: social_uploads_permissions
    restart: "no"
    command:
      - sh
      - -c
      - >
        mkdir -p /uploads/avatars /uploads/chat &&
        chown -R 1000:1000 /uploads &&
        chmod -R u+rwX,g+rwX /uploads
    volumes:
      - uploads_data:/uploads

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/durqan/social-backend:latest}
    container_name: social_backend
    restart: unless-stopped
    pull_policy: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      GMAIL_USERNAME: ${GMAIL_USERNAME:-}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      RABBIT_URL: ${RABBIT_URL:-amqp://guest:guest@rabbitmq:5672/}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      uploads-permissions:
        condition: service_completed_successfully
    networks:
      - social_network

  notifications:
    image: ${NOTIFICATIONS_IMAGE:-ghcr.io/durqan/social-notifications:latest}
    container_name: social_notifications
    restart: unless-stopped
    pull_policy: always
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      RABBIT_URL: ${RABBIT_URL:-amqp://guest:guest@rabbitmq:5672/}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-example@example.com}
      NOTIFICATIONS_INTERNAL_TOKEN: ${NOTIFICATIONS_INTERNAL_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8085/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - social_network

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/durqan/social-frontend:latest}
    container_name: social_frontend
    restart: unless-stopped
    pull_policy: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - notifications
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - social_network

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - social_network

  coturn:
    image: coturn/coturn:4.6.2
    container_name: social_coturn
    restart: unless-stopped
    profiles:
      - turn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
      - "49160-49200:49160-49200/tcp"
    environment:
      TURN_REALM: ${TURN_REALM:-localhost}
      TURN_USERNAME: ${TURN_USERNAME:-social_turn}
      TURN_PASSWORD: ${TURN_PASSWORD:?TURN_PASSWORD is required}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:-}
    entrypoint: /bin/sh
    command:
      - -c
      - >
        exec turnserver
        -n
        --log-file=stdout
        --listening-port=3478
        --min-port=49160
        --max-port=49200
        --realm="$${TURN_REALM}"
        --server-name="$${TURN_REALM}"
        --lt-cred-mech
        --user="$${TURN_USERNAME}:$${TURN_PASSWORD}"
        --fingerprint
        --no-multicast-peers
        --no-cli
        $${TURN_EXTERNAL_IP:+--external-ip=$${TURN_EXTERNAL_IP}}
    networks:
      - social_network

volumes:
  postgres_data:
    name: social_postgres_data
  redis_data:
    name: social_redis_data
  rabbit_data:
    name: social_rabbit_data
  uploads_data:
    name: social_uploads_data

networks:
  social_network:
    name: social_network
    driver: bridge
