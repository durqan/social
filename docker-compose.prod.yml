services:
  postgres:
    image: postgres:18-alpine
    container_name: social_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  redis:
    image: redis:7-alpine
    container_name: social_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  uploads-permissions:
    image: alpine:3.20
    container_name: social_uploads_permissions
    restart: "no"
    command:
      - sh
      - -c
      - >
        mkdir -p /uploads/avatars /uploads/chat &&
        chown -R 1000:1000 /uploads &&
        chmod -R u+rwX,g+rwX /uploads
    volumes:
      - uploads_data:/uploads

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/durqan/social-backend:latest}
    container_name: social_backend
    restart: unless-stopped
    pull_policy: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-25}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES:-30}
      DB_CONN_MAX_IDLE_TIME_MINUTES: ${DB_CONN_MAX_IDLE_TIME_MINUTES:-5}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:?MESSAGE_ENCRYPTION_KEY is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      MOBILE_DEEP_LINK_PREFIX: ${MOBILE_DEEP_LINK_PREFIX:-social://}
      GMAIL_USERNAME: ${GMAIL_USERNAME:-}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD:-}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      CHAT_VIDEO_TEMP_ROOT: ${CHAT_VIDEO_TEMP_ROOT:-/tmp/chat-video-normalization}
      CHAT_VIDEO_NORMALIZATION_CONCURRENCY: ${CHAT_VIDEO_NORMALIZATION_CONCURRENCY:-1}
      CHAT_VIDEO_NORMALIZATION_TIMEOUT: ${CHAT_VIDEO_NORMALIZATION_TIMEOUT:-20m}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      YTDLP_IMPERSONATE: ${YTDLP_IMPERSONATE:-chrome}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      uploads-permissions:
        condition: service_completed_successfully
    networks:
      - social_network

  video-import-worker:
    image: ${BACKEND_IMAGE:-ghcr.io/durqan/social-backend:latest}
    container_name: social_video_import_worker
    restart: unless-stopped
    pull_policy: always
    command: [ "./video-import-worker" ]
    volumes:
      - uploads_data:/app/uploads
      - video_import_tmp:/tmp/video-imports
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-10}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-10}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES:-30}
      DB_CONN_MAX_IDLE_TIME_MINUTES: ${DB_CONN_MAX_IDLE_TIME_MINUTES:-5}
      GIN_MODE: ${GIN_MODE:-release}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:?MESSAGE_ENCRYPTION_KEY is required}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      VIDEO_IMPORT_WORKER_CONCURRENCY: ${VIDEO_IMPORT_WORKER_CONCURRENCY:-1}
      VIDEO_IMPORT_QUEUE_SIZE: ${VIDEO_IMPORT_QUEUE_SIZE:-8}
      VIDEO_IMPORT_TEMP_ROOT: ${VIDEO_IMPORT_TEMP_ROOT:-/tmp/video-imports}
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      YTDLP_IMPERSONATE: ${YTDLP_IMPERSONATE:-chrome}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_network

  gateway:
    image: nginx:1.29-alpine
    container_name: social_gateway
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/gateway-health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - social_network

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
      - coturn_cert_reload:/var/run/certbot-hooks:rw
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap 'exit 0' TERM INT
        while :; do
          certbot renew --deploy-hook 'touch /var/run/certbot-hooks/coturn-cert-renewed'
          sleep 12h &
          wait "$!"
        done
    networks:
      - social_network

  coturn-cert-reloader:
    image: docker:27-cli
    container_name: social_coturn_cert_reloader
    restart: unless-stopped
    profiles:
      - turn
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - coturn_cert_reload:/var/run/certbot-hooks:rw
    entrypoint: /bin/sh
    command:
      - -c
      - |
        marker=/var/run/certbot-hooks/coturn-cert-renewed
        mkdir -p /var/run/certbot-hooks
        touch "$$marker"
        last="$$(stat -c %Y "$$marker" 2>/dev/null || echo 0)"
        while :; do
          current="$$(stat -c %Y "$$marker" 2>/dev/null || echo 0)"
          if [ "$$current" != "$$last" ]; then
            last="$$current"
            docker restart social_coturn >/dev/null || true
          fi
          sleep 60
        done
    networks:
      - social_network

  coturn:
    image: coturn/coturn:4.6.2
    container_name: social_coturn
    restart: unless-stopped
    user: root
    profiles:
      - turn
    ports:
      - "3478:3478/tcp"
      - "3478:3478/udp"
      - "49160-49200:49160-49200/udp"
      - "49160-49200:49160-49200/tcp"
    expose:
      - "5349/tcp"
    volumes:
      - ./certbot/conf:/etc/letsencrypt:ro
    environment:
      TURN_REALM: ${TURN_REALM:-turn.durqan.ru}
      TURN_USERNAME: ${TURN_USERNAME:-social_turn}
      TURN_PASSWORD: ${TURN_PASSWORD:?TURN_PASSWORD is required}
      TURN_EXTERNAL_IP: ${TURN_EXTERNAL_IP:?TURN_EXTERNAL_IP is required for Docker TURN relay candidates}
      TURN_TLS_LISTENING_PORT: ${TURN_TLS_LISTENING_PORT:-5349}
      TURN_TLS_CERT: ${TURN_TLS_CERT:-/etc/letsencrypt/live/turn.durqan.ru/fullchain.pem}
      TURN_TLS_PKEY: ${TURN_TLS_PKEY:-/etc/letsencrypt/live/turn.durqan.ru/privkey.pem}
    entrypoint: /bin/sh
    command:
      - -c
      - |
        exec turnserver \
        -n \
        --log-file=stdout \
        --listening-ip=0.0.0.0 \
        --listening-port=3478 \
        --tls-listening-port="$$TURN_TLS_LISTENING_PORT" \
        --cert="$$TURN_TLS_CERT" \
        --pkey="$$TURN_TLS_PKEY" \
        --min-port=49160 \
        --max-port=49200 \
        --realm="$$TURN_REALM" \
        --server-name="$$TURN_REALM" \
        --lt-cred-mech \
        --user="$$TURN_USERNAME:$$TURN_PASSWORD" \
        --fingerprint \
        --no-multicast-peers \
        --no-cli \
        --external-ip=$$TURN_EXTERNAL_IP
    networks:
      - social_network

volumes:
  postgres_data:
    name: social_postgres_data
  redis_data:
    name: social_redis_data
  uploads_data:
    name: social_uploads_data
  video_import_tmp:
    name: social_video_import_tmp
  coturn_cert_reload:
    name: social_coturn_cert_reload

networks:
  social_network:
    name: social_network
    driver: bridge
