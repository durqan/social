services:
  postgres:
    image: postgres:18-alpine
    container_name: social_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      TZ: UTC
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  redis:
    image: redis:7-alpine
    container_name: social_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - social_network

  livekit:
    image: livekit/livekit-server:v1.13.4
    container_name: social_livekit
    restart: unless-stopped
    command:
      - --config
      - /etc/livekit/livekit.prod.yaml
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}"
    ports:
      - "7881:7881/tcp"
      - "3478:3478/udp"
      - "50000-50100:50000-50100/udp"
    expose:
      - "7880/tcp"
      - "5349/tcp"
    volumes:
      - ./livekit/livekit.prod.yaml:/etc/livekit/livekit.prod.yaml:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:7880/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - social_network

  uploads-permissions:
    image: alpine:3.20
    container_name: social_uploads_permissions
    restart: "no"
    command:
      - sh
      - -c
      - >
        mkdir -p /uploads/avatars /uploads/chat &&
        chown -R 1000:1000 /uploads &&
        chmod -R u+rwX,g+rwX /uploads
    volumes:
      - uploads_data:/uploads

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/durqan/social-backend:latest}
    container_name: social_backend
    restart: unless-stopped
    pull_policy: always
    volumes:
      - uploads_data:/app/uploads
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      DB_MAX_OPEN_CONNS: ${DB_MAX_OPEN_CONNS:-25}
      DB_MAX_IDLE_CONNS: ${DB_MAX_IDLE_CONNS:-25}
      DB_CONN_MAX_LIFETIME_MINUTES: ${DB_CONN_MAX_LIFETIME_MINUTES:-30}
      DB_CONN_MAX_IDLE_TIME_MINUTES: ${DB_CONN_MAX_IDLE_TIME_MINUTES:-5}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-release}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:?MESSAGE_ENCRYPTION_KEY is required}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      MOBILE_DEEP_LINK_PREFIX: ${MOBILE_DEEP_LINK_PREFIX:-social://}
      PUBLIC_API_URL: ${PUBLIC_API_URL:?PUBLIC_API_URL is required}
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY is required}
      EMAIL_FROM: "${EMAIL_FROM:-Social <no-reply@mail.durqan.ru>}"
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      LIVEKIT_URL: ${LIVEKIT_URL:-http://livekit:7880}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:?LIVEKIT_WS_URL is required}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      CHAT_VIDEO_TEMP_ROOT: ${CHAT_VIDEO_TEMP_ROOT:-/tmp/chat-video-normalization}
      CHAT_VIDEO_NORMALIZATION_CONCURRENCY: ${CHAT_VIDEO_NORMALIZATION_CONCURRENCY:-1}
      CHAT_VIDEO_NORMALIZATION_TIMEOUT: ${CHAT_VIDEO_NORMALIZATION_TIMEOUT:-20m}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
      uploads-permissions:
        condition: service_completed_successfully
    networks:
      - social_network

  gateway:
    image: nginx:1.29-alpine
    container_name: social_gateway
    restart: unless-stopped
    ports:
      - "127.0.0.1:10080:80"
      - "127.0.0.1:10443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
    depends_on:
      backend:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/gateway-health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - social_network

  certbot:
    image: certbot/certbot:latest
    container_name: certbot
    restart: unless-stopped
    volumes:
      - ./certbot/www:/var/www/certbot:rw
      - ./certbot/conf:/etc/letsencrypt:rw
    entrypoint: /bin/sh
    command:
      - -c
      - |
        trap 'exit 0' TERM INT
        while :; do
          certbot renew
          sleep 12h &
          wait "$!"
        done
    networks:
      - social_network

volumes:
  postgres_data:
    name: social_postgres_data
  redis_data:
    name: social_redis_data
  uploads_data:
    name: social_uploads_data
networks:
  social_network:
    name: social_network
    driver: bridge
