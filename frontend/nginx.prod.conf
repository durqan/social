server {
    listen 80;
    server_name durqan.ru www.durqan.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://durqan.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name www.durqan.ru;

    ssl_certificate /etc/letsencrypt/live/durqan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/durqan.ru/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    return 301 https://durqan.ru$request_uri;
}

server {
    listen 443 ssl;
    server_name durqan.ru;

    ssl_certificate /etc/letsencrypt/live/durqan.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/durqan.ru/privkey.pem;

    client_max_body_size 30M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location = /index.html {
        add_header Cache-Control "no-cache" always;
        try_files /index.html =404;
    }

    location = /robots.txt {
        add_header Cache-Control "public, max-age=3600" always;
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        add_header Cache-Control "public, max-age=3600" always;
        try_files /sitemap.xml =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }

    location /uploads/avatars/ {
        proxy_pass http://backend:8080/uploads/avatars/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/messages/upload {
        client_max_body_size 80M;
        client_body_timeout 300s;

        proxy_request_buffering off;
        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        proxy_pass http://backend:8080/messages/upload;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/users/[0-9]+/avatar$ {
        client_max_body_size 30M;
        client_body_buffer_size 10M;
        client_body_timeout 300s;

        proxy_request_buffering off;
        proxy_http_version 1.1;

        proxy_connect_timeout 300s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws {
        proxy_pass http://backend:8080/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /notifications-api/ {
        proxy_pass http://notifications:8085/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

}
