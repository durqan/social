services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-social}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-social}
      POSTGRES_DB: ${POSTGRES_DB:-social}
      TZ: UTC
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\" -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - social_local

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - social_local

  livekit:
    image: livekit/livekit-server:v1.13.4
    restart: unless-stopped
    command:
      - --config
      - /etc/livekit/livekit.local.yaml
      - --node-ip
      - ${LIVEKIT_NODE_IP:-10.0.2.2}
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY:-devkey}: ${LIVEKIT_API_SECRET:-local-development-secret-change-me}"
    ports:
      - "${LIVEKIT_SIGNAL_HOST_PORT:-7880}:7880/tcp"
      - "${LIVEKIT_RTC_TCP_HOST_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_TURN_UDP_HOST_PORT:-3478}:3478/udp"
      - "50000-50100:50000-50100/udp"
    volumes:
      - ./livekit/livekit.local.yaml:/etc/livekit/livekit.local.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -q --spider http://127.0.0.1:7880/ || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - social_local

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - social_local

  minio-create-bucket:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until mc alias set local http://minio:9000 "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}"; do sleep 2; done &&
        mc mb --ignore-existing local/$${S3_BUCKET:-social-local}
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-social-local}
    networks:
      - social_local

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://social:social@postgres:5432/social?sslmode=disable}
      PORT: ${PORT:-8080}
      GIN_MODE: ${GIN_MODE:-debug}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-release}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      MOBILE_DEEP_LINK_PREFIX: ${MOBILE_DEEP_LINK_PREFIX:-social://}
      REDIS_HOST: ${COMPOSE_REDIS_HOST:-redis}
      REDIS_PORT: ${COMPOSE_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${COMPOSE_REDIS_PASSWORD:-}
      REDIS_DB: ${COMPOSE_REDIS_DB:-0}
      LIVEKIT_URL: ${LIVEKIT_URL:-http://livekit:7880}
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL:-ws://10.0.2.2:7880}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:-devkey}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:-local-development-secret-change-me}
      FCM_PROJECT_ID: ${FCM_PROJECT_ID:-}
      FIREBASE_SERVICE_ACCOUNT_JSON_BASE64: ${FIREBASE_SERVICE_ACCOUNT_JSON_BASE64:-}
      FIREBASE_SERVICE_ACCOUNT_JSON: ${FIREBASE_SERVICE_ACCOUNT_JSON:-}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GMAIL_USERNAME: ${GMAIL_USERNAME:-}
      GMAIL_PASSWORD: ${GMAIL_PASSWORD:-}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      CHAT_VIDEO_TEMP_ROOT: ${CHAT_VIDEO_TEMP_ROOT:-/tmp/chat-video-normalization}
      CHAT_VIDEO_NORMALIZATION_CONCURRENCY: ${CHAT_VIDEO_NORMALIZATION_CONCURRENCY:-1}
      CHAT_VIDEO_NORMALIZATION_TIMEOUT: ${CHAT_VIDEO_NORMALIZATION_TIMEOUT:-20m}
      YTDLP_PROXY: ${YTDLP_PROXY:-}
      YTDLP_IMPERSONATE: ${YTDLP_IMPERSONATE:-chrome}
      YTDLP_COOKIES_FILE: ${YTDLP_COOKIES_FILE:-}
    command: air
    ports:
      - "${BACKEND_HOST_PORT:-8080}:8080"
    volumes:
      - ./backend:/app
      - backend_go_pkg:/go/pkg/mod
      - backend_go_build:/root/.cache/go-build
      - uploads_data:/app/uploads
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      livekit:
        condition: service_healthy
    networks:
      - social_local

  video-import-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    working_dir: /app
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgres://social:social@postgres:5432/social?sslmode=disable}
      GIN_MODE: ${GIN_MODE:-debug}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-change-before-release}
      MESSAGE_ENCRYPTION_KEY: ${MESSAGE_ENCRYPTION_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      REDIS_HOST: ${COMPOSE_REDIS_HOST:-redis}
      REDIS_PORT: ${COMPOSE_REDIS_PORT:-6379}
      REDIS_PASSWORD: ${COMPOSE_REDIS_PASSWORD:-}
      REDIS_DB: ${COMPOSE_REDIS_DB:-0}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-local}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-uploads}
      STORAGE_PUBLIC_BASE_URL: ${STORAGE_PUBLIC_BASE_URL:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-auto}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      VIDEO_IMPORT_WORKER_CONCURRENCY: ${VIDEO_IMPORT_WORKER_CONCURRENCY:-1}
      VIDEO_IMPORT_QUEUE_SIZE: ${VIDEO_IMPORT_QUEUE_SIZE:-8}
      VIDEO_IMPORT_TEMP_ROOT: ${VIDEO_IMPORT_TEMP_ROOT:-/tmp/video-imports}
    command: go run ./cmd/video-import-worker
    volumes:
      - ./backend:/app
      - backend_go_pkg:/go/pkg/mod
      - backend_go_build:/root/.cache/go-build
      - uploads_data:/app/uploads
      - video_import_tmp:/tmp/video-imports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - social_local

volumes:
  postgres_data:
    name: social_local_postgres_data
  redis_data:
    name: social_local_redis_data
  minio_data:
    name: social_local_minio_data
  uploads_data:
    name: social_local_uploads_data
  video_import_tmp:
    name: social_local_video_import_tmp
  backend_go_pkg:
    name: social_local_backend_go_pkg
  backend_go_build:
    name: social_local_backend_go_build
networks:
  social_local:
    name: social_local_network
    driver: bridge
