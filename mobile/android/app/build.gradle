import java.net.URI
import java.util.Locale
import java.util.regex.Pattern

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

def propOrEnv = { name ->
    def value = project.findProperty(name)
    if (value == null) {
        value = System.getenv(name)
    }
    return value == null ? null : value.toString().trim()
}

def parsePositiveInteger = { name, value ->
    try {
        def parsed = (value ?: "1") as Integer
        if (parsed < 1) {
            throw new NumberFormatException("not positive")
        }
        return parsed
    } catch (NumberFormatException ignored) {
        throw new GradleException("${name} must be a positive integer.")
    }
}

def releaseVersionCode = parsePositiveInteger("SOCIAL_VERSION_CODE", propOrEnv("SOCIAL_VERSION_CODE"))
def releaseVersionName = propOrEnv("SOCIAL_VERSION_NAME") ?: "1.0.0"
def releaseStoreFilePath = propOrEnv("SOCIAL_UPLOAD_STORE_FILE")
def releaseStorePassword = propOrEnv("SOCIAL_UPLOAD_STORE_PASSWORD")
def releaseKeyAlias = propOrEnv("SOCIAL_UPLOAD_KEY_ALIAS")
def releaseKeyPassword = propOrEnv("SOCIAL_UPLOAD_KEY_PASSWORD")
def releaseSigningConfigured = [
    releaseStoreFilePath,
    releaseStorePassword,
    releaseKeyAlias,
    releaseKeyPassword,
].every { it != null && !it.isBlank() }

def googleServicesFile = file("google-services.json")
if (googleServicesFile.exists()) {
    apply plugin: "com.google.gms.google-services"
}

def validatePublicHttpsUrl = { name, value, required = false ->
    if (value == null || value.isBlank()) {
        if (required) {
            throw new GradleException("${name} must be set for release builds.")
        }
        return
    }
    def trimmed = value.trim()
    if (!trimmed.startsWith("https://")) {
        throw new GradleException("${name} must be a public HTTPS URL for release builds.")
    }

    def uri = new URI(trimmed)
    def host = (uri.host ?: "").toLowerCase(Locale.ROOT)
    if (host.isBlank()) {
        throw new GradleException("${name} must include a public host.")
    }
    def ipv6Host = host.replace("[", "").replace("]", "")
    def privateIpv6Host = ipv6Host == "::1" ||
        (ipv6Host.contains(":") && (ipv6Host.startsWith("fc") || ipv6Host.startsWith("fd")))
    def privateHost = host == "localhost" ||
        host == "127.0.0.1" ||
        host == "10.0.2.2" ||
        host.startsWith("10.") ||
        host.startsWith("192.168.") ||
        privateIpv6Host ||
        (host ==~ /^172\.(1[6-9]|2[0-9]|3[0-1])\..*/)
    if (privateHost || trimmed.contains("/api/api")) {
        throw new GradleException("${name} must not point to localhost, emulator, LAN/private IP, or contain /api/api.")
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '../..'
    // root = file("../../")
    //   The folder where the react-native NPM package is. Default is ../../node_modules/react-native
    // reactNativeDir = file("../../node_modules/react-native")
    //   The folder where the react-native Codegen package is. Default is ../../node_modules/@react-native/codegen
    // codegenDir = file("../../node_modules/@react-native/codegen")
    //   The cli.js file which is the React Native CLI entrypoint. Default is ../../node_modules/react-native/cli.js
    // cliFile = file("../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. Default is "debug", "debugOptimized".
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "liteDebugOptimized", "prodDebug", "prodDebugOptimized"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'
    // hermesCommand = "$rootDir/my-custom-hermesc/bin/hermesc"
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = io.github.react-native-community:jsc-android-intl:2026004.+`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.socialmobile"
    defaultConfig {
        applicationId "com.socialmobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode releaseVersionCode
        versionName releaseVersionName
        manifestPlaceholders = [
            usesCleartextTraffic: "false",
        ]

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"
        }
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            if (releaseSigningConfigured) {
                storeFile file(releaseStoreFilePath)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            manifestPlaceholders = [
                usesCleartextTraffic: "true",
            ]
        }
        release {
            if (releaseSigningConfigured) {
                signingConfig signingConfigs.release
            }
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            manifestPlaceholders = [
                usesCleartextTraffic: "false",
            ]
        }
    }
}

gradle.taskGraph.whenReady { taskGraph ->
    def releasePackageRequested = taskGraph.allTasks.any { task ->
        task.path.endsWith(":app:assembleRelease") || task.path.endsWith(":app:bundleRelease")
    }
    if (!releasePackageRequested) {
        return
    }

    if (!releaseSigningConfigured) {
        throw new GradleException(
            "Release signing is not configured. Set SOCIAL_UPLOAD_STORE_FILE, " +
            "SOCIAL_UPLOAD_STORE_PASSWORD, SOCIAL_UPLOAD_KEY_ALIAS and SOCIAL_UPLOAD_KEY_PASSWORD."
        )
    }
    if (!file(releaseStoreFilePath).exists()) {
        throw new GradleException("Release signing keystore was not found at SOCIAL_UPLOAD_STORE_FILE=${releaseStoreFilePath}.")
    }
    if (!googleServicesFile.exists()) {
        throw new GradleException(
            "android/app/google-services.json is required for production Firebase Messaging release builds."
        )
    }

    validatePublicHttpsUrl("SOCIAL_API_BASE_URL", propOrEnv("SOCIAL_API_BASE_URL"), true)
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}
def patchGeneratedAndroidAutolinkingFiles = {
    def jniDir = file("$buildDir/generated/autolinking/src/main/jni")
    def cmakeFile = file("${jniDir}/Android-autolinking.cmake")
    def cppFile = file("${jniDir}/autolinking.cpp")

    if (!cmakeFile.exists()) {
        throw new GradleException("[durqan-patched-autolinking] CMake file not found: ${cmakeFile}")
    }
    if (!cppFile.exists()) {
        throw new GradleException("[durqan-patched-autolinking] C++ autolinking file not found: ${cppFile}")
    }

    def cmakeText = cmakeFile.getText("UTF-8")
    def cmakeOriginalText = cmakeText
    def skippedDirs = []
    def skippedSpecs = [] as Set

    cmakeText = cmakeText.readLines().collect { line ->
        def matcher = line =~ /^\s*add_subdirectory\("([^"]+)"\s+"?([^")]+)"?\)\s*$/

        if (!matcher.matches()) {
            return line
        }

        def sourceDir = matcher[0][1].replace('\\ ', ' ')
        def buildTarget = matcher[0][2].trim()
        def cmakeLists = new File(sourceDir, "CMakeLists.txt")

        if (cmakeLists.exists()) {
            return line
        }

        skippedDirs.add(sourceDir)

        if (buildTarget.endsWith("_autolinked_build")) {
            skippedSpecs.add(buildTarget.substring(0, buildTarget.length() - "_autolinked_build".length()))
        }

        return "# [durqan-patched-autolinking] skipped missing CMake dir: ${sourceDir}\n# ${line}"
    }.join("\n")

    def librariesMatcher = cmakeText =~ /set\(AUTOLINKED_LIBRARIES\s*([\s\S]*?)\)/
    if (librariesMatcher.find()) {
        def body = librariesMatcher.group(1)
        def libs = body
                .split(/\s+/)
                .collect { it.trim() }
                .findAll { it && !it.startsWith("#") }
                .unique()

        def replacement = new StringBuilder()
        replacement.append("# [durqan-patched-autolinking] guarded AUTOLINKED_LIBRARIES\n")
        replacement.append("set(AUTOLINKED_LIBRARIES)\n")

        libs.each { lib ->
            replacement.append("if(TARGET ${lib})\n")
            replacement.append("  list(APPEND AUTOLINKED_LIBRARIES ${lib})\n")
            replacement.append("endif()\n")
        }

        cmakeText = cmakeText.replace(librariesMatcher.group(0), replacement.toString())
    }

    if (cmakeText != cmakeOriginalText) {
        cmakeFile.write(cmakeText + "\n", "UTF-8")
        println("[durqan-patched-autolinking] patched ${cmakeFile}; skipped missing dirs: ${skippedDirs.size()}")
        skippedDirs.each { println("[durqan-patched-autolinking] skipped dir: ${it}") }
    } else {
        println("[durqan-patched-autolinking] no CMake changes needed: ${cmakeFile}")
    }

    if (skippedSpecs.isEmpty()) {
        println("[durqan-patched-autolinking] no missing codegen specs to remove from autolinking.cpp")
        return
    }

    def cppText = cppFile.getText("UTF-8")
    def cppOriginalText = cppText

    skippedSpecs.each { spec ->
        def quotedSpec = Pattern.quote(spec)

        // Remove missing generated header, for example: #include <NitroModulesSpec.h>
        cppText = cppText.replaceAll("(?m)^\\s*#include\\s+<${quotedSpec}\\.h>\\s*\\r?\\n?", "")

        // Remove Java TurboModule provider block, for example:
        // auto module_NitroModulesSpec = NitroModulesSpec_ModuleProvider(moduleName, params);
        // if (module_NitroModulesSpec != nullptr) { return module_NitroModulesSpec; }
        cppText = cppText.replaceAll(
                "(?s)\\s*auto\\s+([A-Za-z0-9_]+)\\s*=\\s*${quotedSpec}_ModuleProvider\\s*\\([^;]*\\);\\s*if\\s*\\(\\s*\\1\\s*!=\\s*nullptr\\s*\\)\\s*\\{\\s*return\\s+\\1\\s*;\\s*\\}",
                "\n"
        )

        // Remove any remaining single-line generated references to that missing spec.
        cppText = cppText.readLines()
                .findAll { !it.contains(spec) }
                .join("\n")
    }

    if (cppText != cppOriginalText) {
        cppFile.write(cppText + "\n", "UTF-8")
        println("[durqan-patched-autolinking] patched ${cppFile}; removed missing specs: ${skippedSpecs.join(', ')}")
    } else {
        println("[durqan-patched-autolinking] no C++ autolinking changes needed: ${cppFile}")
    }
}

tasks.configureEach { task ->
    if (
        task.name.startsWith("configureCMake") ||
        task.name.startsWith("externalNativeBuild") ||
        task.name.startsWith("buildCMake")
    ) {
        task.dependsOn("generateAutolinkingNewArchitectureFiles")
        task.doFirst {
            patchGeneratedAndroidAutolinkingFiles()
        }
    }
}
